name: CI

on:
  push:
    branches:
     - main
     - master
     - next
     - v*
    paths-ignore:
     - docs/**
     - '*.md'
  pull_request:
    paths-ignore:
     - docs/**
     - '*.md'

jobs:
  test:
    uses: fastify/workflows/.github/workflows/plugins-ci.yml@v3
    permissions:
      contents: write
      pull-requests: write
    with:
      license-check: false
      lint: false
